#   https://lefthook.dev/configuration/
#
assert_lefthook_installed: true

pre-push:
  jobs:
    - name: build
      run: bun run build
      glob: '*.{js,jsx,ts,tsx,json,jsonc,css}'

    - name: audit
      run: bun audit --audit-level=moderate

pre-commit:
  jobs:
    - name: typecheck
      run: bun typecheck
      glob: '*.{ts,tsx,json}'
      stage_fixed: true

    - name: lint
      run: bun lint
      glob: '*.{js,jsx,ts,tsx,json,jsonc,css}'
      stage_fixed: true

    - name: markdown
      run: bun x prettier --write {staged_files} --arrow-parens=avoid --no-semi --single-quote --trailing-comma=none
      glob: '*.md'
      stage_fixed: true

    - name: i18n
      run: bun i18n
      glob: '*.{ts,tsx,po}'
      stage_fixed: true

    - name: test
      run: bun run test --findRelatedTests --passWithNoTests {staged_files}
      glob: '*.{ts,tsx,json}'

commit-msg:
  commands:
    commitlint:
      run: bun x commitlint --edit {1}
