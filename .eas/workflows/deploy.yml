name: Deploy

on:
  push:
    branches: ['main']
    tags: ['v*']

jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint
    environment: ${{ github.ref_name == 'main' && 'preview' || 'production' }}

  get_android_build:
    name: Check existing Android build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      profile: ${{ github.ref_name == 'main' && 'preview' || 'production' }}

  get_ios_build:
    name: Check existing iOS build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: ${{ github.ref_name == 'main' && 'preview' || 'production' }}

  # Native changed — build new binaries
  build_android:
    name: Build Android
    needs: [get_android_build]
    if: ${{ !needs.get_android_build.outputs.build_id }}
    type: build
    params:
      platform: android
      profile: ${{ github.ref_name == 'main' && 'preview' || 'production' }}

  build_ios:
    name: Build iOS
    needs: [get_ios_build]
    if: ${{ !needs.get_ios_build.outputs.build_id }}
    type: build
    params:
      platform: ios
      profile: ${{ github.ref_name == 'main' && 'preview' || 'production' }}

  # Tags only — submit new builds to stores
  submit_android:
    name: Submit Android
    needs: [build_android]
    if: ${{ github.ref_name != 'main' }}
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}

  submit_ios:
    name: Submit iOS
    needs: [build_ios]
    if: ${{ github.ref_name != 'main' }}
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}

  # JS-only changes — publish OTA update
  update_android:
    name: OTA Update Android
    needs: [get_android_build]
    if: ${{ needs.get_android_build.outputs.build_id }}
    type: update
    params:
      branch: ${{ github.ref_name == 'main' && 'preview' || 'production' }}
      platform: android

  update_ios:
    name: OTA Update iOS
    needs: [get_ios_build]
    if: ${{ needs.get_ios_build.outputs.build_id }}
    type: update
    params:
      branch: ${{ github.ref_name == 'main' && 'preview' || 'production' }}
      platform: ios

  notify:
    name: Slack Notification
    after: [submit_android, submit_ios, update_android, update_ios, build_android, build_ios]
    type: slack
    params:
      webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      message: "Deploy ${{ github.ref_name }} completed (${{ github.sha }})"
